<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Clock & Stopwatch</title>
    <link rel="stylesheet" href="time.css">
</head>
<body>

    <div class="container">
        <div class="card">
            <h2> Clock </h2>
            <div id="clock" class="display">00:00:00</div>
        </div>

        <div class="card">
            <h2>Stopwatch</h2>
            <div id="stopwatch" class="display stopwatch-color">00:00:00</div>
            <div class="buttons">
                <button id="startBtn" class="btn btn-start">Start</button>
                <button id="pauseBtn" class="btn btn-pause">Pause</button>
                <button id="resetBtn" class="btn btn-reset">Reset</button>
            </div>
        </div>
    </div>

    <script src="time.js"></script>
</body>
</html>
